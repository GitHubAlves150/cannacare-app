version: '3.8'

services:
  nextjs:
    image: node:20-alpine
    container_name: cannacare_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    command: sh -c "npm install && npm run dev"
    restart: always
